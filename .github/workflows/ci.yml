name: Worker Finder CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:

  backend-build-test:
    name: Backend – Maven Build & JUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        working-directory: rest-api
        run: mvn clean compile -B

      - name: Run unit tests
        working-directory: rest-api
        run: mvn test -B


  frontend-build:
    name: Frontend – npm Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build


  docker-build-push:
    name: Docker – Build & Push Image
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: echo "Docker step placeholder (will work after secrets added)"


  deploy:
    name: Deploy (Disabled)
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: false

    steps:
      - run: echo "Deployment skipped"
