name: Worker Finder CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Build & Test the Spring Boot REST API (Backend)
  # ─────────────────────────────────────────────────────────────
  backend-build-test:
    name: Backend – Maven Build & JUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build backend with Maven
        working-directory: rest-api
        run: mvn clean compile -B

      - name: Run unit tests
        working-directory: rest-api
        run: mvn test -B

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: rest-api/target/surefire-reports/

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Build the React Frontend
  # ─────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend – npm Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Docker Build & Push (runs only on main branch)
  # ─────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker – Build & Push Image
    runs-on: ubuntu-latest
    needs: [backend-build-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17 (for Maven package)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Package Spring Boot JAR
        working-directory: rest-api
        run: mvn package -DskipTests -B

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: rest-api
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/worker-finder-api:latest

  # ─────────────────────────────────────────────────────────────
  # JOB 4 — Deploy to Render (runs after Docker push)
  # ─────────────────────────────────────────────────────────────
  deploy:
  name: Deploy to Render (Staging)
  runs-on: ubuntu-latest
  needs: docker-build-push
  if: false   # 🔥 disable for now

  steps:
    - name: Skip deploy
      run: echo "Deployment skipped"